name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Security audit
        # High findings are mostly transitive dev-tooling (esbuild/vite/wrangler); no safe fix yet.
        run: npm audit --audit-level=critical
      - run: npx astro sync
      - run: npx astro check
      - run: npm run lint
      - uses: supabase/setup-cli@v2
        with:
          version: 2.98.2
      - name: Start local Supabase
        run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector
      - name: Export local Supabase env for tests
        run: |
          supabase status -o env \
            --override-name api.url=SUPABASE_URL \
            --override-name auth.anon_key=SUPABASE_KEY \
            --override-name auth.service_role_key=SUPABASE_SERVICE_ROLE_KEY \
            > .env.test
      - name: Run tests
        run: bash scripts/ci-supabase-test.sh
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
